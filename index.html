<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07111f"><title>LifePlan AI Australia</title><style>body{margin:0;background:#06101c;color:#f4f8fb;font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:760px;margin:auto;padding:28px 16px}.card{background:#0c1827;border:1px solid #213852;border-radius:22px;padding:20px;margin:14px 0}h1{font-size:38px}.muted{color:#93a8bd}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}input,select,button{width:100%;box-sizing:border-box;padding:12px;border-radius:12px;border:1px solid #213852;background:#071421;color:white}button{background:#35dda5;color:#032218;font-weight:800}.metric{background:#0a1725;border-radius:14px;padding:14px}.metric b{display:block;font-size:24px}.hidden{display:none}@media(max-width:650px){.grid{grid-template-columns:1fr}}</style></head>
<body><main class="wrap"><h1>LifePlan AI</h1><p class="muted">Enter your monthly after-tax income to generate a practical Australian budget.</p><section class="card"><input id="income" type="number" placeholder="Monthly after-tax income"><button id="go" style="margin-top:10px">Generate my plan</button></section><section id="app" class="hidden"><section class="card"><h2>Your monthly blueprint</h2><div id="budget"></div></section><section class="card"><h2>Hostplus-style super projection</h2><div class="grid"><input id="age" type="number" placeholder="Current age"><input id="retire" type="number" placeholder="Retirement age"><input id="super" type="number" placeholder="Current super"><input id="salary" type="number" placeholder="Annual salary"><input id="extra" type="number" placeholder="Extra monthly salary sacrifice"><select id="sr"><option value=".05">5% return</option><option value=".07" selected>7% balanced example</option><option value=".085">8.5% growth example</option></select></div><div id="sout" class="muted" style="margin-top:14px">Fill in your details to generate a projection.</div></section><section class="card"><h2>IVV.AU investment example</h2><div class="grid"><input id="ib" type="number" placeholder="Current investment"><input id="im" type="number" placeholder="Monthly investment"><input id="iy" type="number" placeholder="Years"><select id="ir"><option value=".06">6% return</option><option value=".08" selected>8% long-term example</option><option value=".10">10% higher-growth example</option></select></div><div id="iout" class="muted" style="margin-top:14px">Enter an investment period to generate a projection.</div></section><button id="reset">Reset</button></section></main><script>const $=x=>document.getElementById(x),m=n=>new Intl.NumberFormat('en-AU',{style:'currency',currency:'AUD',maximumFractionDigits:0}).format(n);let inc=0;function budget(){let p=inc<4000?[65,10,15,5,5]:inc>12000?[42,10,10,33,5]:inc>8000?[47,10,13,25,5]:[50,10,15,20,5],n=['Living costs','Lifestyle','Goal fund','Investing & wealth','Buffer'];$('budget').innerHTML=n.map((x,i)=>`<p><b>${x}</b>: ${m(inc*p[i]/100)} (${p[i]}%)</p>`).join('');$('im').value=Math.round(inc*p[3]/100)}function superCalc(){let a=+$('age').value,r=+$('retire').value,b=+$('super').value,s=+$('salary').value,e=+$('extra').value||0,z=+$('sr').value;if(!a||!r||r<=a||!s){$('sout').textContent='Fill in your details to generate a projection.';return}let y=r-a,ann=(s*.12+e*12)*.85;for(let i=0;i<y;i++)b=(b+ann)*(1+z);$('sout').innerHTML=`<div class="grid"><div class="metric">Projected super<b>${m(b)}</b></div><div class="metric">Today's dollars<b>${m(b/Math.pow(1.025,y))}</b></div><div class="metric">4% draw<b>${m(b*.04)}/yr</b></div></div>`}function ivv(){let b=+$('ib').value||0,x=+$('im').value||0,y=+$('iy').value,z=+$('ir').value;if(!y){$('iout').textContent='Enter an investment period to generate a projection.';return}let n=y*12,v=b;for(let i=0;i<n;i++)v=v*(1+z/12)+x;let c=b+x*n;$('iout').innerHTML=`<div class="grid"><div class="metric">Future value<b>${m(v)}</b></div><div class="metric">Contributions<b>${m(c)}</b></div><div class="metric">Estimated growth<b>${m(v-c)}</b></div></div>`}$('go').onclick=()=>{inc=+$('income').value;if(inc<1000)return;$('app').classList.remove('hidden');budget()};['age','retire','super','salary','extra','sr'].forEach(x=>$(x).oninput=superCalc);['ib','im','iy','ir'].forEach(x=>$(x).oninput=ivv);$('reset').onclick=()=>location.reload();</script></body></html>
